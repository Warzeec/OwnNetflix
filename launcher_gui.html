<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abbott Elementary — Saison 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #07070e;
  --bg-surface: #0e0e1a;
  --bg-card: #131325;
  --bg-card-hover: #1a1a35;
  --border-subtle: rgba(255,255,255,0.05);
  --border-hover: rgba(212,149,58,0.35);
  --gold: #d4953a;
  --gold-light: #eabb6e;
  --gold-dim: #a06f22;
  --gold-glow: rgba(212,149,58,0.18);
  --teal: #4fb3c2;
  --teal-dim: #2a7a88;
  --teal-glow: rgba(79,179,194,0.12);
  --red: #c94a4a;
  --text: #e5e3dd;
  --text-sec: #8888a0;
  --text-muted: #4e4e68;
  --radius: 14px;
  --transition: 0.3s cubic-bezier(.4,0,.2,1);
}

html { font-size: 15px; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 120px;
}

/* Vignette */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  background: radial-gradient(ellipse at 50% 40%, transparent 40%, rgba(4,4,10,0.55) 100%);
}

/* Dot texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 101;
  opacity: 0.3;
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 20px 20px;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-sec); }

/* ── HEADER ───────────────────── */
.header {
  position: relative;
  padding: 48px 40px 28px;
  max-width: 1100px;
  margin: 0 auto;
}

.header__badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(212,149,58,0.1);
  border: 1px solid rgba(212,149,58,0.2);
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 0.73rem;
  font-weight: 500;
  color: var(--gold-light);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 18px;
  animation: fadeDown 0.6s ease both;
}

.header__title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(2.4rem, 5vw, 3.6rem);
  line-height: 1.05;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--text) 30%, var(--gold-light) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: fadeDown 0.6s 0.08s ease both;
}

.header__sub {
  margin-top: 10px;
  color: var(--text-sec);
  font-size: 0.95rem;
  font-weight: 400;
  animation: fadeDown 0.6s 0.16s ease both;
}

.header__sub span { color: var(--gold); font-weight: 600; }

/* Season progress bar */
.season-bar {
  margin-top: 22px;
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
  animation: fadeDown 0.6s 0.24s ease both;
}

.season-bar__fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal-dim), var(--teal));
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(.4,0,.2,1);
  position: relative;
}

.season-bar__fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: -2px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 12px var(--teal-glow);
}

/* ── EPISODE GRID ─────────────── */
.grid-wrapper {
  max-width: 1100px;
  margin: 0 auto;
  padding: 12px 40px 0;
  position: relative;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  position: relative;
}

/* Cursor spotlight */
.grid__spotlight {
  position: absolute;
  width: 350px;
  height: 350px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--gold-glow), transparent 70%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
  transform: translate(-50%, -50%);
  z-index: 0;
}

.grid:hover .grid__spotlight { opacity: 1; }

/* ── EPISODE CARD ─────────────── */
.card {
  position: relative;
  z-index: 1;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 20px 18px 16px;
  cursor: pointer;
  transition: transform var(--transition), border-color var(--transition),
              box-shadow var(--transition), background var(--transition);
  opacity: 0;
  animation: cardIn 0.5s ease both;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
  background: transparent;
  transition: background var(--transition);
}

.card:hover {
  transform: translateY(-4px);
  border-color: var(--border-hover);
  background: var(--bg-card-hover);
  box-shadow: 0 12px 40px rgba(0,0,0,0.35), 0 0 30px var(--gold-glow);
}

/* Card thumbnail */
.card__thumb {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 8px;
  object-fit: cover;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.03);
  display: block;
  transition: opacity var(--transition), filter var(--transition);
}
.card:hover .card__thumb { opacity: 0.85; }
.card.watched .card__thumb { filter: brightness(0.55) saturate(0.5); }
.card.now-playing .card__thumb { filter: brightness(0.7) saturate(1.2); }

.card__num {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2.2rem;
  line-height: 1;
  color: var(--text-muted);
  transition: color var(--transition);
  margin-bottom: 6px;
}

.card__code {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
  transition: color var(--transition);
}

.card__title {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text-sec);
  line-height: 1.3;
  transition: color var(--transition);
}

.card__status {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  transition: all var(--transition);
  border: 2px solid transparent;
  z-index: 2;
}

/* Card states */
.card.watched::before { background: linear-gradient(90deg, var(--teal-dim), var(--teal)); }
.card.watched .card__num { color: var(--teal); }
.card.watched .card__code { color: var(--teal-dim); }
.card.watched .card__title { color: var(--text); }
.card.watched .card__status {
  background: rgba(79,179,194,0.15);
  border-color: var(--teal);
  color: var(--teal);
}

.card.selected {
  border-color: var(--gold);
  background: rgba(212,149,58,0.06);
  box-shadow: 0 0 25px var(--gold-glow), inset 0 0 25px rgba(212,149,58,0.04);
}
.card.selected::before { background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
.card.selected .card__num { color: var(--gold); }
.card.selected .card__code { color: var(--gold-dim); }
.card.selected .card__title { color: var(--text); }
.card.selected .card__status {
  background: rgba(212,149,58,0.15);
  border-color: var(--gold);
  color: var(--gold);
}

.card.in-range {
  border-color: rgba(212,149,58,0.35);
  background: rgba(212,149,58,0.05);
  box-shadow: 0 0 16px rgba(212,149,58,0.08), inset 0 0 16px rgba(212,149,58,0.03);
}
.card.in-range::before { background: linear-gradient(90deg, rgba(160,111,34,0.5), rgba(212,149,58,0.5)); }
.card.in-range .card__num { color: rgba(212,149,58,0.75); }
.card.in-range .card__code { color: var(--gold-dim); }
.card.in-range .card__title { color: var(--text-sec); }

/* Now playing */
.card.now-playing {
  border-color: var(--gold);
  background: rgba(212,149,58,0.08);
  animation: nowPlayingPulse 2s ease-in-out infinite, cardIn 0.5s ease both;
}
.card.now-playing::before { background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
.card.now-playing .card__num { color: var(--gold-light); }
.card.now-playing .card__status {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--bg-deep);
}

@keyframes nowPlayingPulse {
  0%, 100% { box-shadow: 0 0 20px var(--gold-glow), inset 0 0 20px rgba(212,149,58,0.03); }
  50% { box-shadow: 0 0 40px rgba(212,149,58,0.3), inset 0 0 30px rgba(212,149,58,0.06); }
}

/* Server badge */
.server-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-left: 14px;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-muted);
  padding: 4px 12px;
  border-radius: 100px;
  border: 1px solid var(--border-subtle);
  vertical-align: middle;
  animation: fadeDown 0.6s 0.1s ease both;
}
.server-badge__dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background 0.3s, box-shadow 0.3s;
}
.server-badge.connected { color: #4ade80; border-color: rgba(74,222,128,0.2); }
.server-badge.connected .server-badge__dot { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.4); }

/* Now playing bar (top) */
.np-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 3px;
  z-index: 300;
  background: transparent;
  overflow: hidden;
}
.np-bar.active { background: rgba(212,149,58,0.12); }
.np-bar__fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  width: 30%;
  animation: npSweep 2.5s ease-in-out infinite;
  opacity: 0;
}
.np-bar.active .np-bar__fill { opacity: 1; }
@keyframes npSweep {
  0% { width: 0%; margin-left: 0; }
  50% { width: 35%; margin-left: 32%; }
  100% { width: 0%; margin-left: 100%; }
}

/* Now playing info in controls */
.np-info {
  display: none;
  align-items: center;
  gap: 10px;
  font-size: 0.82rem;
  color: var(--gold-light);
}
.np-info.active { display: flex; }
.np-info__dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  animation: breathe 1.5s ease-in-out infinite;
  flex-shrink: 0;
}

/* Watch toggle button on card */
.card__watch-btn {
  position: absolute;
  bottom: 12px;
  right: 12px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1px solid var(--border-subtle);
  background: rgba(255,255,255,0.04);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  opacity: 0;
  z-index: 2;
}
.card:hover .card__watch-btn { opacity: 1; }
.card__watch-btn:hover {
  border-color: var(--teal);
  color: var(--teal);
  background: rgba(79,179,194,0.1);
  transform: scale(1.15);
}
.card.watched .card__watch-btn {
  opacity: 0.6;
  border-color: var(--teal-dim);
  color: var(--teal);
}
.card.watched:hover .card__watch-btn { opacity: 1; }
.card.watched .card__watch-btn:hover {
  border-color: var(--red);
  color: var(--red);
  background: rgba(201,74,74,0.1);
}

/* Play button disabled during playback */
.play-btn.disabled {
  opacity: 0.4;
  pointer-events: none;
  animation: none;
}

/* ── CONTROL BAR ──────────────── */
.controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: rgba(10,10,22,0.82);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border-top: 1px solid var(--border-subtle);
  padding: 16px 40px;
  animation: slideUp 0.6s 0.5s ease both;
}

.controls__inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 28px;
  flex-wrap: wrap;
  justify-content: center;
}

.ctrl-group {
  display: flex;
  align-items: center;
  gap: 10px;
}

.ctrl-group label {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-sec);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
}

.ctrl-input {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  width: 56px;
  text-align: center;
  padding: 6px 4px;
  transition: border-color var(--transition), box-shadow var(--transition);
  outline: none;
}

.ctrl-input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 12px var(--gold-glow);
}

/* Toggle switch */
.toggle {
  position: relative;
  display: inline-block;
  width: 42px;
  height: 24px;
}

.toggle input { opacity: 0; width: 0; height: 0; }

.toggle__track {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.08);
  border-radius: 24px;
  border: 1px solid var(--border-subtle);
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
}

.toggle__track::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--text-sec);
  transition: transform var(--transition), background var(--transition);
}

.toggle input:checked + .toggle__track {
  background: rgba(201,74,74,0.2);
  border-color: var(--red);
}

.toggle input:checked + .toggle__track::after {
  transform: translateX(18px);
  background: var(--red);
}

/* Play button */
.play-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--gold), var(--gold-dim));
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-left: 3px;
  box-shadow: 0 0 30px var(--gold-glow), 0 4px 20px rgba(0,0,0,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
  animation: breathe 3.5s ease-in-out infinite;
  flex-shrink: 0;
}

.play-btn svg { width: 22px; height: 22px; fill: var(--bg-deep); }

.play-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 50px var(--gold-glow), 0 6px 28px rgba(0,0,0,0.4);
  animation: none;
}

.play-btn:active { transform: scale(0.94); }

/* Reset button */
.reset-btn {
  background: none;
  border: 1px solid var(--border-subtle);
  color: var(--text-muted);
  font-size: 0.72rem;
  font-weight: 500;
  font-family: 'Outfit', sans-serif;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: all var(--transition);
}

.reset-btn:hover {
  border-color: var(--red);
  color: var(--red);
  background: rgba(201,74,74,0.06);
}

/* ── TOAST ─────────────────────── */
.toast {
  position: fixed;
  top: 28px;
  right: 28px;
  z-index: 500;
  background: rgba(16,16,30,0.92);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  padding: 14px 22px;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transform: translateX(120%);
  transition: transform 0.45s cubic-bezier(.4,0,.2,1);
  display: flex;
  align-items: center;
  gap: 10px;
}

.toast.visible { transform: translateX(0); }
.toast__icon { font-size: 1.2rem; }

/* ── MODAL ─────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 400;
  background: rgba(4,4,10,0.8);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s;
}

.modal-overlay.active { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  padding: 36px 34px 28px;
  max-width: 440px;
  width: 90%;
  transform: scale(0.92) translateY(20px);
  transition: transform 0.4s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}

.modal-overlay.active .modal { transform: scale(1) translateY(0); }

.modal__title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1.5rem;
  margin-bottom: 8px;
}

.modal__text {
  color: var(--text-sec);
  font-size: 0.88rem;
  line-height: 1.6;
  margin-bottom: 20px;
}

.modal__episodes {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border-subtle);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 22px;
  max-height: 160px;
  overflow-y: auto;
}

.modal__ep-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  font-size: 0.82rem;
  color: var(--text-sec);
  border-bottom: 1px solid var(--border-subtle);
}

.modal__ep-item:last-child { border-bottom: none; }
.modal__ep-item span:first-child { color: var(--gold); font-weight: 600; font-family: 'Syne', sans-serif; }

.modal__actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}

.modal__btn {
  padding: 10px 22px;
  border-radius: 10px;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all var(--transition);
  border: none;
}

.modal__btn--cancel {
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-sec);
}

.modal__btn--cancel:hover { border-color: var(--text-muted); color: var(--text); }

.modal__btn--confirm {
  background: linear-gradient(135deg, var(--gold), var(--gold-dim));
  color: var(--bg-deep);
}

.modal__btn--confirm:hover { box-shadow: 0 0 20px var(--gold-glow); transform: translateY(-1px); }

.modal__shutdown-warn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(201,74,74,0.08);
  border: 1px solid rgba(201,74,74,0.2);
  border-radius: 8px;
  padding: 8px 14px;
  margin-bottom: 18px;
  font-size: 0.78rem;
  color: var(--red);
}

/* ── KEYFRAMES ─────────────────── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(100%); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes breathe {
  0%, 100% { box-shadow: 0 0 28px var(--gold-glow), 0 4px 18px rgba(0,0,0,0.3); }
  50% { box-shadow: 0 0 48px rgba(212,149,58,0.28), 0 4px 22px rgba(0,0,0,0.35); }
}

@keyframes checkPop {
  0% { transform: scale(0); }
  60% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* ── RESPONSIVE ────────────────── */
@media (max-width: 700px) {
  .header { padding: 32px 20px 20px; }
  .grid-wrapper { padding: 8px 20px 0; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .controls { padding: 14px 16px; }
  .controls__inner { gap: 14px; }
  .card { padding: 16px 14px 14px; }
  .card__num { font-size: 1.8rem; }
}
</style>
</head>
<body>

<!-- NOW PLAYING BAR -->
<div class="np-bar" id="npBar"><div class="np-bar__fill"></div></div>

<!-- HEADER -->
<header class="header">
  <div class="header__badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Saison <span id="seasonNum">1</span>
  </div>
  <div class="server-badge" id="serverBadge">
    <span class="server-badge__dot"></span>
    <span>Hors ligne</span>
  </div>
  <h1 class="header__title" id="showTitle">Abbott Elementary</h1>
  <p class="header__sub"><span id="totalCount">—</span> episodes &middot; <span id="watchedCount">0</span><span> vus</span></p>
  <div class="season-bar">
    <div class="season-bar__fill" id="seasonFill" style="width: 0%"></div>
  </div>
</header>

<!-- EPISODE GRID -->
<section class="grid-wrapper">
  <div class="grid" id="grid">
    <div class="grid__spotlight" id="spotlight"></div>
    <!-- Cards injected by JS -->
  </div>
</section>

<!-- CONTROL BAR -->
<div class="controls">
  <div class="controls__inner">
    <div class="ctrl-group">
      <label for="startEp">Reprendre</label>
      <input type="number" id="startEp" class="ctrl-input" min="1" value="1">
    </div>
    <div class="ctrl-group">
      <label for="epCount">Episodes</label>
      <input type="number" id="epCount" class="ctrl-input" min="1" value="3">
    </div>
    <div class="ctrl-group">
      <label>Eteindre</label>
      <label class="toggle">
        <input type="checkbox" id="shutdownToggle">
        <span class="toggle__track"></span>
      </label>
    </div>
    <div class="np-info" id="npInfo">
      <span class="np-info__dot"></span>
      <span id="npText">En lecture...</span>
    </div>
    <button class="play-btn" id="playBtn" title="Lancer la lecture">
      <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
    </button>
    <button class="reset-btn" id="resetBtn">Reset</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 class="modal__title" id="modalTitle">Bonne seance !</h2>
    <p class="modal__text" id="modalText">Ces episodes vont etre marques comme vus :</p>
    <div class="modal__shutdown-warn" id="shutdownWarn" style="display:none">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Le PC s'eteindra apres la lecture
    </div>
    <div class="modal__episodes" id="modalEpisodes"></div>
    <div class="modal__actions">
      <button class="modal__btn modal__btn--cancel" id="modalCancel">Annuler</button>
      <button class="modal__btn modal__btn--confirm" id="modalConfirm">Marquer comme vus</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="toast__icon"></span>
  <span class="toast__msg"></span>
</div>

<script>
let EPISODES = [];

const STORAGE_KEY = 'abbott_s01_progress';
const API_BASE = location.protocol === 'file:'
  ? 'http://localhost:8899'
  : '';

// ── State ──
let watched = loadWatched();
let selectedStart = getNextUnwatched();
let serverConnected = false;
let nowPlayingEp = null;
let pollTimer = null;

function loadWatched() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch { return new Set(); }
}

function saveWatched() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...watched]));
}

function getNextUnwatched() {
  for (const ep of EPISODES) {
    if (!watched.has(ep.num)) return ep.num;
  }
  return 1;
}

// ── DOM refs ──
const grid = document.getElementById('grid');
const spotlight = document.getElementById('spotlight');
const startInput = document.getElementById('startEp');
const countInput = document.getElementById('epCount');
const shutdownToggle = document.getElementById('shutdownToggle');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const seasonFill = document.getElementById('seasonFill');
const watchedCountEl = document.getElementById('watchedCount');
const modalOverlay = document.getElementById('modalOverlay');
const modalEpisodes = document.getElementById('modalEpisodes');
const modalCancel = document.getElementById('modalCancel');
const modalConfirm = document.getElementById('modalConfirm');
const shutdownWarn = document.getElementById('shutdownWarn');
const toast = document.getElementById('toast');
const npBar = document.getElementById('npBar');
const npInfo = document.getElementById('npInfo');
const npText = document.getElementById('npText');
const serverBadge = document.getElementById('serverBadge');

// ── Server communication ──
async function init() {
  // 1. Fetch episodes from server
  try {
    const res = await fetch(`${API_BASE}/api/episodes`, { signal: AbortSignal.timeout(5000) });
    if (res.ok) {
      const data = await res.json();
      serverConnected = true;
      EPISODES = data.episodes;
      document.getElementById('showTitle').textContent = data.show;
      document.getElementById('seasonNum').textContent = data.season;
      localStorage.setItem('episodes_cache', JSON.stringify(data));
    }
  } catch {
    serverConnected = false;
  }

  // 2. Fallback to cache
  if (EPISODES.length === 0) {
    try {
      const cached = JSON.parse(localStorage.getItem('episodes_cache'));
      if (cached && cached.episodes) {
        EPISODES = cached.episodes;
        document.getElementById('showTitle').textContent = cached.show;
        document.getElementById('seasonNum').textContent = cached.season;
      }
    } catch {}
  }

  if (EPISODES.length === 0) return;

  // 3. Update dynamic values
  document.getElementById('totalCount').textContent = EPISODES.length;
  startInput.max = EPISODES.length;
  countInput.max = EPISODES.length;

  // 4. Init state
  watched = loadWatched();
  selectedStart = getNextUnwatched();
  startInput.value = selectedStart;

  buildGrid();
  renderGrid();
  updateProgress();
  updateServerBadge();

  // 5. Sync with server if connected
  if (serverConnected) {
    try {
      const progressRes = await fetch(`${API_BASE}/api/progress`);
      if (progressRes.ok) {
        const pd = await progressRes.json();
        for (let i = 1; i < pd.next_episode; i++) watched.add(i);
        saveWatched();
        selectedStart = getNextUnwatched();
        startInput.value = selectedStart;
      }
      const statusRes = await fetch(`${API_BASE}/api/status`);
      if (statusRes.ok) {
        const st = await statusRes.json();
        if (st.playing) {
          st.completed.forEach(ep => watched.add(ep));
          saveWatched();
          nowPlayingEp = st.current_episode;
          startPolling();
        }
      }
      renderGrid();
      updateProgress();
    } catch {}
  }
}

function updateServerBadge() {
  serverBadge.className = 'server-badge' + (serverConnected ? ' connected' : '');
  serverBadge.querySelector('span:last-child').textContent = serverConnected ? 'Connecte' : 'Hors ligne';
}

async function serverPlay(start, count, shutdown) {
  try {
    const res = await fetch(`${API_BASE}/api/play`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ start, count, shutdown })
    });
    const data = await res.json();
    if (res.ok) {
      showToast('VLC lance !', 'success');
      startPolling();
      return true;
    }
    showToast(data.error || 'Erreur', 'info');
    return false;
  } catch {
    showToast('Impossible de contacter le serveur', 'info');
    return false;
  }
}

let lastPollKey = '';

function startPolling() {
  npBar.classList.add('active');
  playBtn.classList.add('disabled');
  lastPollKey = '';

  pollTimer = setInterval(async () => {
    try {
      const res = await fetch(`${API_BASE}/api/status`);
      const st = await res.json();

      // State diffing: only update DOM if something changed
      const pollKey = `${st.current_episode}|${st.completed.join(',')}|${st.playing}`;
      if (pollKey === lastPollKey) return;
      lastPollKey = pollKey;

      // Update watched from server
      st.completed.forEach(ep => watched.add(ep));
      saveWatched();
      nowPlayingEp = st.current_episode;

      // Update now playing info text
      if (st.current_episode) {
        const ep = EPISODES.find(e => e.num === st.current_episode);
        npInfo.classList.add('active');
        npText.textContent = ep ? `${ep.code} — ${ep.title}` : `Episode ${st.current_episode}`;
      }

      renderGrid();
      updateProgress();

      if (!st.playing) {
        stopPolling();
        selectedStart = getNextUnwatched();
        startInput.value = selectedStart;
        renderGrid();
        showToast('Lecture terminee !', 'success');
      }
    } catch {
      stopPolling();
    }
  }, 2000);
}

function stopPolling() {
  clearInterval(pollTimer);
  pollTimer = null;
  nowPlayingEp = null;
  npBar.classList.remove('active');
  npInfo.classList.remove('active');
  playBtn.classList.remove('disabled');
}

// ── Build grid (once) ──
function buildGrid() {
  EPISODES.forEach((ep, i) => {
    const card = document.createElement('div');
    card.id = `ep-${ep.num}`;
    card.className = 'card';
    card.style.animationDelay = `${0.04 * i + 0.2}s`;

    // After intro animation: fix final state and disable animation
    card.addEventListener('animationend', () => {
      card.style.opacity = '1';
      card.style.transform = 'translateY(0) scale(1)';
      card.style.animation = 'none';
    }, { once: true });

    const thumbBase = location.protocol === 'file:' ? 'http://localhost:8899' : '';
    card.innerHTML = `
      <div class="card__status"></div>
      <img class="card__thumb" src="${thumbBase}/thumbs/${ep.code}.jpg" alt="${ep.title}" loading="lazy">
      <div class="card__code">${ep.code}</div>
      <div class="card__title">${ep.title}</div>
      <button class="card__watch-btn" title="Marquer comme vu">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    `;

    // Watch toggle button
    card.querySelector('.card__watch-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      if (pollTimer) return;
      toggleWatched(ep.num);
      renderGrid();
      updateProgress();
    });

    card.addEventListener('click', (e) => {
      if (pollTimer) return;
      if (e.ctrlKey || e.metaKey) {
        toggleWatched(ep.num);
      } else {
        selectedStart = ep.num;
        startInput.value = ep.num;
      }
      renderGrid();
      updateProgress();
    });

    card.addEventListener('dblclick', () => {
      if (pollTimer) return;
      toggleWatched(ep.num);
      renderGrid();
      updateProgress();
    });

    grid.appendChild(card);
  });
}

function toggleWatched(num) {
  if (watched.has(num)) watched.delete(num);
  else watched.add(num);
  saveWatched();
  if (serverConnected) {
    const maxW = watched.size > 0 ? Math.max(...watched) : 0;
    fetch(`${API_BASE}/api/progress`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ episode: maxW + 1 })
    }).catch(() => {});
  }
}

// ── Update grid (classes + icons only, no DOM rebuild) ──
function renderGrid() {
  const start = parseInt(startInput.value) || 1;
  const count = parseInt(countInput.value) || 1;
  const rangeEnd = start + count - 1;

  EPISODES.forEach(ep => {
    const card = document.getElementById(`ep-${ep.num}`);
    if (!card) return;

    // Update classes without touching animation
    card.classList.remove('watched', 'selected', 'in-range', 'now-playing');

    if (nowPlayingEp === ep.num) {
      card.classList.add('now-playing');
    } else if (watched.has(ep.num)) {
      card.classList.add('watched');
    } else if (ep.num === start && !nowPlayingEp) {
      card.classList.add('selected');
    } else if (ep.num > start && ep.num <= rangeEnd && !watched.has(ep.num) && !nowPlayingEp) {
      card.classList.add('in-range');
    }

    // Update status icon
    const statusEl = card.querySelector('.card__status');
    let icon;
    if (nowPlayingEp === ep.num) {
      icon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>`;
    } else if (watched.has(ep.num)) {
      icon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    } else if (ep.num === start && !nowPlayingEp) {
      icon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>`;
    } else {
      icon = `<span style="font-size:0.7rem;color:var(--text-muted)">${String(ep.num).padStart(2,'0')}</span>`;
    }
    statusEl.innerHTML = icon;
  });
}

function updateProgress() {
  const pct = EPISODES.length > 0 ? (watched.size / EPISODES.length) * 100 : 0;
  seasonFill.style.width = pct + '%';
  watchedCountEl.textContent = watched.size;
}

// ── Spotlight cursor effect ──
grid.addEventListener('mousemove', (e) => {
  const rect = grid.getBoundingClientRect();
  spotlight.style.left = (e.clientX - rect.left) + 'px';
  spotlight.style.top = (e.clientY - rect.top) + 'px';
});

// ── Controls ──
startInput.addEventListener('input', () => {
  let v = parseInt(startInput.value);
  if (v < 1) v = 1;
  if (v > 13) v = 13;
  selectedStart = v;
  renderGrid();
});

countInput.addEventListener('input', renderGrid);

// ── Play button ──
playBtn.addEventListener('click', () => {
  if (pollTimer) return; // Already playing

  const start = parseInt(startInput.value) || 1;
  const count = parseInt(countInput.value) || 1;
  const shutdown = shutdownToggle.checked;

  const epsInRange = EPISODES.filter(ep => ep.num >= start && ep.num < start + count);
  const epsUnwatched = epsInRange.filter(ep => !watched.has(ep.num));

  if (epsInRange.length === 0) {
    showToast('Aucun episode selectionne', 'info');
    return;
  }

  // Build modal content
  shutdownWarn.style.display = shutdown ? 'flex' : 'none';
  modalEpisodes.innerHTML = '';
  epsInRange.forEach(ep => {
    const item = document.createElement('div');
    item.className = 'modal__ep-item';
    const tag = watched.has(ep.num) ? ' <span style="opacity:0.4">(deja vu)</span>' : '';
    item.innerHTML = `<span>${ep.code}</span><span>${ep.title}${tag}</span>`;
    modalEpisodes.appendChild(item);
  });

  // Adapt modal based on server connection
  const modalTitle = document.getElementById('modalTitle');
  const modalText = document.getElementById('modalText');
  if (serverConnected) {
    modalTitle.textContent = 'Lancer VLC';
    modalText.textContent = `${epsInRange.length} episode(s) vont etre lances dans VLC :`;
    modalConfirm.textContent = 'Lancer la lecture';
  } else {
    modalTitle.textContent = 'Bonne seance !';
    modalText.textContent = 'Marquer ces episodes comme vus :';
    modalConfirm.textContent = 'Marquer comme vus';
  }

  modalOverlay.classList.add('active');

  // Confirm handler
  modalConfirm.onclick = async () => {
    modalOverlay.classList.remove('active');

    if (serverConnected) {
      // Launch VLC via server
      await serverPlay(start, count, shutdown);
    } else {
      // Offline mode: just mark as watched
      epsInRange.forEach(ep => watched.add(ep.num));
      saveWatched();
      selectedStart = getNextUnwatched();
      startInput.value = selectedStart;
      renderGrid();
      updateProgress();
      showToast(`${epsInRange.length} episode(s) marques comme vus`, 'success');
    }
  };
});

modalCancel.addEventListener('click', () => modalOverlay.classList.remove('active'));
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) modalOverlay.classList.remove('active');
});

// ── Reset ──
resetBtn.addEventListener('click', () => {
  if (pollTimer) return;
  if (!confirm('Remettre toute la progression a zero ?')) return;
  watched.clear();
  saveWatched();
  startInput.value = 1;
  selectedStart = 1;
  if (serverConnected) {
    fetch(`${API_BASE}/api/progress`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ episode: 1 })
    }).catch(() => {});
  }
  renderGrid();
  updateProgress();
  showToast('Progression remise a zero', 'reset');
});

// ── Toast ──
let toastTimer;
function showToast(msg, type = 'info') {
  const iconMap = { success: '\u2728', info: '\u2139\uFE0F', reset: '\u21A9\uFE0F' };
  toast.querySelector('.toast__icon').textContent = iconMap[type] || '';
  toast.querySelector('.toast__msg').textContent = msg;
  toast.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('visible'), 3200);
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); playBtn.click(); }
  if (e.key === 'ArrowRight') { startInput.value = Math.min(EPISODES.length || 1, (parseInt(startInput.value)||1) + 1); startInput.dispatchEvent(new Event('input')); }
  if (e.key === 'ArrowLeft') { startInput.value = Math.max(1, (parseInt(startInput.value)||1) - 1); startInput.dispatchEvent(new Event('input')); }
  if (e.key === 'Escape') modalOverlay.classList.remove('active');
});

// ── Init ──
init();
</script>

</body>
</html>
